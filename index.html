<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Website</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="header"></div>

    <div class="container">
      <div class="introduction">
        <p class="title">Hello, here is Anya Forger</p>
        <img
          src="assets/img/anya-forger.png"
          alt="anya forger"
          class="img-anya"
        />
        <p class="desc">A psychic</p>
      </div>
    </div>
    <div class="parallax">
      <div id="family" class="family">
        <p class="title">Anya Forger</p>
        <p class="desc">Waku-waku!</p>
        <div class="mt-12">
          <button class="btn">Let's Go</button>
        </div>
      </div>
      <div class="container">
        <div class="card">
          <div class="card-item">
            <img src="assets/img/loid-forger.png" alt="loid forger" />
            <p class="card-title">Papa</p>
            <p class="card-desc">Loid Forger</p>
          </div>
          <div class="card-item">
            <img src="assets/img/yor-forger.png" alt="yor forger" />
            <p class="card-title">Mama</p>
            <p class="card-desc">Yor Forger</p>
          </div>
          <div class="card-item">
            <img src="assets/img/bond-forger.png" alt="bond-forger" />
            <p class="card-title">Dog</p>
            <p class="card-desc">Bond Forger</p>
          </div>
        </div>
      </div>
    </div>

    <div id="footer"></div>

    <script>
      fetch("header.html")
        .then((res) => res.text())
        .then((html) => {
          document.getElementById("header").innerHTML = html;
        });

      fetch("footer.html")
        .then((res) => res.text())
        .then((html) => {
          document.getElementById("footer").innerHTML = html;
        });
    </script>
  </body>
</html>
